<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Banner Gabriel Silva - Desenvolvedor FullStack</title>
  <desc>Banner animado com tema dark azul e roxo para perfil GitHub</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f1a2e"/>
      <stop offset="100%" style="stop-color:#1a0d2e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .particle { animation: float linear infinite; opacity: 0.5; }
      @keyframes float {
        0% { transform: translateY(0px) translateX(0px); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.4; }
        100% { transform: translateY(-180px) translateX(20px); opacity: 0; }
      }
      .code-tag { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      .typing { animation: blink 1s step-end infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .slide-in { animation: slideIn 1s ease-out forwards; opacity: 0; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .slide-in-2 { animation: slideIn 1s ease-out 0.3s forwards; opacity: 0; }
      .slide-in-3 { animation: slideIn 1s ease-out 0.6s forwards; opacity: 0; }
      .line-anim { animation: drawLine 1.5s ease-out 0.8s forwards; stroke-dashoffset: 300; stroke-dasharray: 300; }
      @keyframes drawLine { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <rect width="680" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <line x1="0" y1="40" x2="680" y2="40" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="80" x2="680" y2="80" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="120" x2="680" y2="120" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="160" x2="680" y2="160" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="136" y1="0" x2="136" y2="200" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="272" y1="0" x2="272" y2="200" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="408" y1="0" x2="408" y2="200" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="544" y1="0" x2="544" y2="200" stroke="#58a6ff" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Particles -->
  <circle class="particle" cx="60" cy="190" r="2" fill="#58a6ff" style="animation-duration:4s; animation-delay:0s"/>
  <circle class="particle" cx="120" cy="190" r="1.5" fill="#a855f7" style="animation-duration:5s; animation-delay:1s"/>
  <circle class="particle" cx="200" cy="190" r="2" fill="#58a6ff" style="animation-duration:3.5s; animation-delay:0.5s"/>
  <circle class="particle" cx="300" cy="190" r="1" fill="#a855f7" style="animation-duration:6s; animation-delay:2s"/>
  <circle class="particle" cx="420" cy="190" r="1.5" fill="#58a6ff" style="animation-duration:4.5s; animation-delay:0.8s"/>
  <circle class="particle" cx="520" cy="190" r="2" fill="#a855f7" style="animation-duration:3.8s; animation-delay:1.5s"/>
  <circle class="particle" cx="620" cy="190" r="1" fill="#58a6ff" style="animation-duration:5.5s; animation-delay:0.3s"/>

  <!-- Decorative code brackets -->
  <text x="30" y="120" font-family="monospace" font-size="72" fill="#58a6ff" fill-opacity="0.08" class="code-tag">&lt;</text>
  <text x="610" y="120" font-family="monospace" font-size="72" fill="#a855f7" fill-opacity="0.08" class="code-tag">/&gt;</text>

  <!-- Accent line left -->
  <rect x="60" y="72" width="3" height="56" fill="url(#textGrad)" rx="2"/>

  <!-- Main name -->
  <text class="slide-in" x="76" y="108" font-family="monospace" font-size="36" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">Gabriel Silva</text>

  <!-- Subtitle -->
  <text class="slide-in-2" x="77" y="135" font-family="monospace" font-size="14" fill="#8b949e">Desenvolvedor FullStack</text>

  <!-- Animated underline -->
  <line x1="76" y1="143" x2="376" y2="143" stroke="url(#textGrad)" stroke-width="1" class="line-anim"/>



  <!-- Right side - code snippet decoration -->
  <g opacity="0.25">
    <text x="440" y="75" font-family="monospace" font-size="11" fill="#58a6ff">const dev = {</text>
    <text x="450" y="92" font-family="monospace" font-size="11" fill="#8b949e">  name: <tspan fill="#a8d8a8">"Gabriel"</tspan>,</text>
    <text x="450" y="109" font-family="monospace" font-size="11" fill="#8b949e">  role: <tspan fill="#a8d8a8">"FullStack"</tspan>,</text>
    <text x="450" y="126" font-family="monospace" font-size="11" fill="#8b949e">  city: <tspan fill="#a8d8a8">"Goiânia"</tspan>,</text>
    <text x="450" y="143" font-family="monospace" font-size="11" fill="#8b949e">  status: <tspan fill="#58a6ff">"open"</tspan></text>
    <text x="440" y="160" font-family="monospace" font-size="11" fill="#58a6ff">}</text>
  </g>

  <!-- Cursor blink -->
  <rect class="typing" x="442" y="163" width="7" height="12" fill="#a855f7" rx="1"/>
</svg>
